name: Deploy AI Content Generator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-3
  NODE_VERSION: '18'

jobs:
  # ── Test ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.API_GATEWAY_URL }}

  # ── Deploy Backend ────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (SAM)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      api-url: ${{ steps.sam-deploy.outputs.api-url }}
      frontend-bucket: ${{ steps.sam-deploy.outputs.frontend-bucket }}
      cloudfront-url: ${{ steps.sam-deploy.outputs.cloudfront-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install Lambda dependencies
        run: |
          cd backend/lambda/generate && npm ci --production
          cd ../history && npm ci --production

      - name: SAM Build
        run: sam build --template infrastructure/template.yaml

      - name: SAM Deploy
        id: sam-deploy
        run: |
          sam deploy \
            --stack-name content-generator-stack \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              OpenAIApiKey=${{ secrets.OPENAI_API_KEY }} \
              OpenAIModel=gpt-3.5-turbo \
              MaxTokens=1000

          # Extract outputs
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name content-generator-stack \
            --query "Stacks[0].Outputs[?OutputKey=='APIGatewayURL'].OutputValue" \
            --output text)
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name content-generator-stack \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          CF_URL=$(aws cloudformation describe-stacks \
            --stack-name content-generator-stack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontURL'].OutputValue" \
            --output text)

          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend-bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront-url=$CF_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"
          echo "Frontend URL: $CF_URL"

  # ── Deploy Frontend ───────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.api-url }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-backend.outputs.frontend-bucket }} \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html should not be cached aggressively
          aws s3 cp frontend/dist/index.html s3://${{ needs.deploy-backend.outputs.frontend-bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[0].DomainName | contains(@, 'content-generator')].Id" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Frontend | ${{ needs.deploy-backend.outputs.cloudfront-url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ API | ${{ needs.deploy-backend.outputs.api-url }} |" >> $GITHUB_STEP_SUMMARY