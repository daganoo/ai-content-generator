AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Content Generator - Serverless application using Groq AI

Parameters:
  GroqApiKey:
    Type: String
    Description: Groq API Key
    NoEcho: true
  AIModel:
    Type: String
    Default: llama3-8b-8192
    Description: Groq model to use
  MaxTokens:
    Type: Number
    Default: 1000
    Description: Maximum tokens for generation

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs18.x
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref ContentHistoryTable
        GROQ_API_KEY: !Ref GroqApiKey
        AI_MODEL: !Ref AIModel
        MAX_TOKENS: !Ref MaxTokens

Resources:
  # DynamoDB Table
  ContentHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: content-generator-history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # API Gateway
  ContentAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  # Generate Lambda Function
  GenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: content-generator-generate
      CodeUri: ../backend/lambda/generate/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContentHistoryTable
      Events:
        GenerateAPI:
          Type: Api
          Properties:
            RestApiId: !Ref ContentAPI
            Path: /generate
            Method: post
        OptionsAPI:
          Type: Api
          Properties:
            RestApiId: !Ref ContentAPI
            Path: /generate
            Method: options

  # History Lambda Function
  HistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: content-generator-history
      CodeUri: ../backend/lambda/history/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContentHistoryTable
      Events:
        HistoryAPI:
          Type: Api
          Properties:
            RestApiId: !Ref ContentAPI
            Path: /history
            Method: get

  # S3 Bucket for Frontend
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub content-generator-frontend-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  # S3 Bucket Policy for CloudFront
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

  # CloudFront Origin Access Identity
  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for AI Content Generator

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods:
            - GET
            - HEAD
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  APIGatewayURL:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ContentAPI}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: ContentGeneratorAPIURL

  FrontendBucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket

  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub https://${CloudFrontDistribution.DomainName}
    Export:
      Name: ContentGeneratorFrontendURL

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref ContentHistoryTable